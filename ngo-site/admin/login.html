<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — HopeBridge NGO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="bi bi-tree-fill text-success" style="font-size: 2.5rem;"></i>
      <h4 class="mt-2 mb-0">HopeBridge Admin</h4>
      <small class="text-muted">Sign in to manage content</small>
    </div>
    <!-- action="login.php" method="post" once converted -->
    <form action="dashboard.html" method="post">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="admin@hopebridge.org" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label small" for="remember">Remember me</label>
        </div>
        <a href="#" class="small text-success">Forgot?</a>
      </div>
      <button type="submit" class="btn btn-primary-ngo w-100">Sign In</button>
    </form>
    <p class="text-center small text-muted mt-3 mb-0">&copy; 2026 HopeBridge NGO</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
